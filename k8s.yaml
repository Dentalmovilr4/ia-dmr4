apiVersion: v1
kind: Namespace
metadata:
  name: dmr4
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: dmr4
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:7
        ports:
        - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: dmr4
spec:
  selector:
    app: redis
  ports:
  - port: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: dmr4
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
      - name: api
        image: node:18
        command: ["node","api.js"]
        ports:
        - containerPort: 3001
        env:
        - name: REDIS_URL
          value: redis://redis:6379
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: dmr4
spec:
  selector:
    app: api
  ports:
  - port: 80
    targetPort: 3001
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: scheduler
  namespace: dmr4
spec:
  replicas: 1
  selector:
    matchLabels:
      app: scheduler
  template:
    metadata:
      labels:
        app: scheduler
    spec:
      containers:
      - name: scheduler
        image: node:18
        command: ["node","scheduler.js"]
        env:
        - name: REDIS_URL
          value: redis://redis:6379
        - name: REGION
          value: global
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: failover
  namespace: dmr4
spec:
  replicas: 1
  selector:
    matchLabels:
      app: failover
  template:
    metadata:
      labels:
        app: failover
    spec:
      containers:
      - name: failover
        image: node:18
        command: ["node","failover.js"]
        env:
        - name: REDIS_URL
          value: redis://redis:6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: workers-us
  namespace: dmr4
spec:
  replicas: 2
  selector:
    matchLabels:
      app: worker-us
  template:
    metadata:
      labels:
        app: worker-us
    spec:
      containers:
      - name: worker
        image: node:18
        command: ["node","worker.js"]
        env:
        - name: REDIS_URL
          value: redis://redis:6379
        - name: REGION
          value: us-east
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: workers-eu
  namespace: dmr4
spec:
  replicas: 2
  selector:
    matchLabels:
      app: worker-eu
  template:
    metadata:
      labels:
        app: worker-eu
    spec:
      containers:
      - name: worker
        image: node:18
        command: ["node","worker.js"]
        env:
        - name: REDIS_URL
          value: redis://redis:6379
        - name: REGION
          value: eu-west
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: api-ingress
  namespace: dmr4
spec:
  rules:
  - host: dmr4.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: api
            port:
              number: 80
