apiVersion: v1
kind: Namespace
metadata:
  name: dmr4
---
# =========================
# REDIS (Stateful Cluster simple)
# =========================
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: dmr4
spec:
  serviceName: redis
  replicas: 3
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:7
        ports:
        - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: dmr4
spec:
  clusterIP: None
  selector:
    app: redis
  ports:
  - port: 6379
---
# =========================
# API
# =========================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: dmr4
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
      - name: api
        image: node:18
        command: ["node","api.js"]
        ports:
        - containerPort: 3001
        env:
        - name: REDIS_URL
          value: redis://redis:6379
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: dmr4
spec:
  selector:
    app: api
  ports:
  - port: 80
    targetPort: 3001
---
# =========================
# HPA AUTO-SCALING
# =========================
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-hpa
  namespace: dmr4
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 60
---
# =========================
# WORKERS MULTI-REGIÓN
# =========================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: workers-us
  namespace: dmr4
spec:
  replicas: 3
  selector:
    matchLabels:
      app: worker-us
  template:
    metadata:
      labels:
        app: worker-us
    spec:
      containers:
      - name: worker
        image: node:18
        command: ["node","worker.js"]
        env:
        - name: REDIS_URL
          value: redis://redis:6379
        - name: REGION
          value: us-east
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: workers-eu
  namespace: dmr4
spec:
  replicas: 3
  selector:
    matchLabels:
      app: worker-eu
  template:
    metadata:
      labels:
        app: worker-eu
    spec:
      containers:
      - name: worker
        image: node:18
        command: ["node","worker.js"]
        env:
        - name: REDIS_URL
          value: redis://redis:6379
        - name: REGION
          value: eu-west
---
# =========================
# PROMETHEUS
# =========================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: dmr4
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
      - name: prometheus
        image: prom/prometheus
        ports:
        - containerPort: 9090
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: dmr4
spec:
  selector:
    app: prometheus
  ports:
  - port: 9090
---
# =========================
# GRAFANA
# =========================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: dmr4
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
      - name: grafana
        image: grafana/grafana
        ports:
        - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: dmr4
spec:
  selector:
    app: grafana
  ports:
  - port: 3000
---
# =========================
# INGRESS
# =========================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dmr4-ingress
  namespace: dmr4
spec:
  rules:
  - host: dmr4.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: api
            port:
              number: 80
