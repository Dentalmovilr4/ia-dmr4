name: Auditoria IA DMR4

on:
  schedule:
    - cron: '0 13 * * *' # 8 AM Colombia
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm install
          npm install @google/generative-ai axios

      - name: Run Audit Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node index.js

      - name: Guardar Memoria de Auditoria
        run: |
          git config --global user.name 'Dentalmovilr4-AI'
          git config --global user.email 'ai@dentalmovilr4.com'
          
          git add historial_dmr4.json || echo "No hay historial nuevo"
          git commit -m "DMR4: Actualizando memoria [skip ci]" || echo "Sin cambios"
          
          git push origin main