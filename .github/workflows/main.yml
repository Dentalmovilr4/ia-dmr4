name: CI-IA-DMR4-AUTOCORRECTOR

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: write

jobs:
  ai-fix:
    runs-on: ubuntu-latest

    steps:

    # ----------------------
    # CLONAR
    # ----------------------
    - name: 📥 Checkout
      uses: actions/checkout@v4

    # ----------------------
    # NODE
    # ----------------------
    - name: 🟢 Node
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    # ----------------------
    # DEPENDENCIAS
    # ----------------------
    - name: 📦 Install
      run: npm install --legacy-peer-deps

    # ----------------------
    # DETECTAR ERRORES
    # ----------------------
    - name: 🧪 Analizar errores
      id: scan
      run: |
        echo "🔍 Escaneando JS..."

        node <<'EOF'
        const { execSync } = require('child_process');
        const fs = require('fs');

        const files = execSync('find . -name "*.js"')
          .toString()
          .trim()
          .split('\n')
          .filter(Boolean);

        let errors = [];

        for (const f of files) {
          try {
            execSync(`node -c "${f}"`, { stdio: 'pipe' });
          } catch (e) {
            errors.push(f);
          }
        }

        fs.writeFileSync('errors.json', JSON.stringify(errors, null, 2));

        console.log('Errores encontrados:', errors);

        if (errors.length > 0) {
          process.exit(1);
        }
        EOF

    # ----------------------
    # SI NO HAY ERRORES
    # ----------------------
    - name: ✔ Sin errores
      if: success()
      run: echo "Todo OK"

    # ----------------------
    # IA AUTO-FIX
    # ----------------------
    - name: 🧠 IA Fix Engine
      if: failure()
      run: |
        node <<'EOF'
        const fs = require('fs');
        const axios = require('axios');

        const errors = JSON.parse(
          fs.readFileSync('errors.json', 'utf8')
        );

        async function fix(file) {
          const code = fs.readFileSync(file, 'utf8');

          const prompt = `
Eres un experto en Node.js.
Corrige este código sin cambiar su lógica principal.
Devuelve SOLO el código corregido.

ARCHIVO:
${file}

CODIGO:
${code}
`;

          const res = await axios.post(
            'https://api.openai.com/v1/chat/completions',
            {
              model: 'gpt-4o-mini',
              messages: [
                {
                  role: 'user',
                  content: prompt
                }
              ]
            },
            {
              headers: {
                Authorization: 'Bearer ' + process.env.OPENAI_API_KEY,
                'Content-Type': 'application/json'
              }
            }
          );

          const fixed = res.data.choices[0].message.content;

          fs.writeFileSync(file, fixed);

          console.log('Fixed:', file);
        }

        (async () => {
          for (const f of errors) {
            await fix(f);
          }
        })();
        EOF
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

    # ----------------------
    # VALIDACIÓN POST-FIX
    # ----------------------
    - name: 🔁 Recheck
      run: |
        for file in $(find . -name "*.js"); do
          node -c "$file" || exit 1
        done

    # ----------------------
    # AUTO COMMIT FIX
    # ----------------------
    - name: 📦 Commit fixes
      if: success()
      run: |
        git config user.name "dmr4-ai-bot"
        git config user.email "ai@dmr4.bot"

        git add .

        git commit -m "🤖 AI Auto-Fix aplicado por DMR4 CI" || echo "sin cambios"

        git push