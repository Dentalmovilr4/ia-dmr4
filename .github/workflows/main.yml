name: CI-IA-DMR4-CORE

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout
      uses: actions/checkout@v4

    - name: 🟢 Node 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    # ----------------------
    # DEPENDENCIAS SEGURAS
    # ----------------------
    - name: 📦 Install limpio
      run: npm ci

    # ----------------------
    # VALIDACIÓN DE CÓDIGO
    # ----------------------
    - name: 🧪 Verificar sintaxis global
      run: |
        node -c brain.js
        node -c server.js
        node -c processManager.js
        node -c dex.js

    # ----------------------
    # SEGURIDAD
    # ----------------------
    - name: 🔒 Auditoría crítica
      run: npm audit --audit-level=high --omit=dev

    # ----------------------
    # IA AUDITOR (NO BLOQUEANTE)
    # ----------------------
    - name: 🧠 Auditoría IA
      run: node index.js || echo "⚠️ IA reportó problemas"

    # ----------------------
    # TEST DE ARRANQUE REAL
    # ----------------------
    - name: ⚙️ Test de ejecución
      run: |
        node server.js &
        sleep 5
        pkill -f server.js || true

    # ----------------------
    # TELEGRAM
    # ----------------------
    - name: 📡 Éxito
      if: success()
      uses: appleboy/telegram-action@v0.1.1
      with:
        to: ${{ secrets.CHAT_ID }}
        token: ${{ secrets.TELEGRAM_TOKEN }}
        message: |
          ✅ *DMR4 CORE OK*
          
          🧠 Sistema validado
          🔒 Seguridad OK
          ⚙️ Arranque OK

    - name: 🚨 Fallo
      if: failure()
      uses: appleboy/telegram-action@v0.1.1
      with:
        to: ${{ secrets.CHAT_ID }}
        token: ${{ secrets.TELEGRAM_TOKEN }}
        message: |
          ❌ *DMR4 FALLÓ*
          
          🔍 Revisar errores en CI
          🤖 Sistema necesita intervención
