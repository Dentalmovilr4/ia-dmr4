name: CI-IA-DMR4-FINAL

on:
  push:
    branches: [ main ] # Se activa cuando subes algo a la rama principal

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    
    - name: Configurar Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Instalar dependencias
      run: npm install

    - name: Test de Seguridad
      run: |
        echo "🔍 Escaneando vulnerabilidades en el código de Dentalmovilr4..."
        npm audit fix --force || true
    - name: Enviar notificación a Telegram
      uses: appleboy/telegram-action@master
      with:
        to: ${{ secrets.CHAT_ID }}
        token: ${{ secrets.TELEGRAM_TOKEN }}
        message: |
          🚀 ¡IA-DMR4 Actualizada!
          
          El repositorio de Dentalmovilr4 ha sido sincronizado con éxito.
          Estado: ✅ Build Finalizado.
          Rama: ${{ github.ref_name }}
          
          El sistema está listo en Termux.

