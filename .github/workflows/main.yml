name: CI-IA-DMR4-PRO

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Clonar repositorio
      uses: actions/checkout@v4

    - name: 🟢 Configurar Node.js (Versión Correcta)
      uses: actions/setup-node@v4
      with:
        node-version: '20' # Actualizado para compatibilidad con Supabase
        cache: 'npm'

    - name: 📦 Instalar dependencias
      run: npm ci

    - name: 🧪 Verificar sintaxis
      run: node -c brain.js || echo "⚠️ Error de sintaxis en brain.js"

    - name: 🔒 Auditoría de seguridad
      run: npm audit --audit-level=high --omit=dev

    - name: 🧠 Auditoría IA DMR4 (Escaneo de Secretos)
      run: node auditoria.js || echo "⚠️ El Auditor IA detectó riesgos"

    - name: ⚙️ Verificar arranque en frío
      run: |
        node brain.js &
        sleep 5
        pkill -f brain.js || true

    - name: 📡 Notificación Telegram (Éxito)
      if: success()
      uses: appleboy/telegram-action@v0.1.1
      with:
        to: ${{ secrets.CHAT_ID }}
        token: ${{ secrets.TELEGRAM_TOKEN }}
        message: |
          ✅ *BUILD EXITOSO: IA-DMR4 PRO*
          📦 Repo: ${{ github.repository }}
          👤 Autor: ${{ github.actor }}
          🚀 El sistema está listo para operar.

    - name: 🚨 Notificación Telegram (Fallo)
      if: failure()
      uses: appleboy/telegram-action@v0.1.1
      with:
        to: ${{ secrets.CHAT_ID }}
        token: ${{ secrets.TELEGRAM_TOKEN }}
        message: |
          ❌ *FALLO EN BUILD: IA-DMR4 PRO*
          🔍 Revisa los logs de GitHub Actions.
          ⚠️ Posible incompatibilidad o error de sintaxis.
