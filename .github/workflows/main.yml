name: CI-IA-DMR4-PRO

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Clonar repositorio
      uses: actions/checkout@v4

    - name: 🟢 Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: 📦 Instalar dependencias
      run: npm ci

    # ----------------------
    # VALIDACIÓN BÁSICA
    # ----------------------

    - name: 🧪 Verificar sintaxis
      run: node -c server.js || echo "⚠️ Error en server.js"

    - name: 🧪 Ejecutar tests (si existen)
      run: npm test || echo "⚠️ Sin tests definidos"

    # ----------------------
    # SEGURIDAD
    # ----------------------

    - name: 🔒 Auditoría de seguridad (crítica)
      run: npm audit --audit-level=high --omit=dev

    # ----------------------
    # TU IA AUDITOR 🔥
    # ----------------------

    - name: 🧠 Auditoría IA DMR4
      run: node index.js || echo "⚠️ Auditor IA falló"

    # ----------------------
    # BUILD CHECK
    # ----------------------

    - name: ⚙️ Verificar arranque
      run: |
        node server.js &
        sleep 5
        pkill -f server.js || true

    # ----------------------
    # NOTIFICACIONES
    # ----------------------

    - name: 📡 Notificación éxito
      if: success()
      uses: appleboy/telegram-action@v0.1.1
      with:
        to: ${{ secrets.CHAT_ID }}
        token: ${{ secrets.TELEGRAM_TOKEN }}
        message: |
          ✅ *DMR4 BUILD EXITOSO*

          📦 Repo: ${{ github.repository }}
          🌿 Rama: ${{ github.ref_name }}
          👤 Autor: ${{ github.actor }}

    - name: 🚨 Notificación fallo
      if: failure()
      uses: appleboy/telegram-action@v0.1.1
      with:
        to: ${{ secrets.CHAT_ID }}
        token: ${{ secrets.TELEGRAM_TOKEN }}
        message: |
          ❌ *DMR4 BUILD FALLÓ*

          📦 Repo: ${{ github.repository }}
          🌿 Rama: ${{ github.ref_name }}

          🔍 Revisa errores en GitHub Actions
