<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IA DMR4 FINAL - PANEL</title>
    <style>
        body { background: #0a0a0a; color: #0f0; text-align: center; font-family: 'Courier New', Courier, monospace; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: auto; border: 1px solid #0f0; padding: 20px; border-radius: 10px; box-shadow: 0 0 15px #0f0; }
        .token-card { background: #1a1a1a; border: 1px solid #00bcff; padding: 15px; margin-bottom: 20px; border-radius: 8px; }
        .repo-card { border-bottom: 1px dashed #333; padding: 15px; }
        button { padding: 10px 20px; margin: 5px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .on { background: #0f0; color: #000; }
        .on:hover { background: #0a0; }
        .off { background: #f00; color: #fff; }
        .off:hover { background: #a00; }
        .status { font-weight: bold; margin-top: 10px; }
        h1 { font-size: 1.5rem; text-shadow: 0 0 5px #0f0; }
        .liquidez-val { color: #00bcff; font-size: 1.2rem; }
        .logs-box { background: #000; color: #aaa; font-size: 0.7rem; text-align: left; padding: 10px; height: 100px; overflow-y: auto; margin-top: 10px; border: 1px solid #333; }
    </style>
</head>
<body>

<div class="container">
    <h1>💀 IA DMR4 FINAL</h1>

    <div class="token-card">
        <h3>🪙 DRM4 COIN STATUS</h3>
        <div id="liquidez-info">Cargando datos de Solana...</div>
    </div>

    <hr style="border: 0.5px solid #333;">

    <div id="repos"></div>
</div>

<script>
// Usamos la URL completa para evitar errores de conexión en el móvil
const API_BASE = "http://127.0.0.1:3000";

async function updateLiquidez() {
    try {
        const res = await fetch(`${API_BASE}/api/liquidez`);
        const data = await res.json();
        const div = document.getElementById('liquidez-info');

        if(data.error) {
            div.innerHTML = `<span style="color:orange">⚠️ Conectando con red...</span>`;
        } else if(data.liquidez > 0) {
            div.innerHTML = `
                <div class="liquidez-val">$${parseFloat(data.liquidez).toFixed(2)} USD</div>
                <div style="font-size:0.8rem">Precio: $${data.precio}</div>
                <div style="color:#0f0; font-size:0.7rem">🟢 POOL ACTIVO</div>
            `;
        } else {
            div.innerHTML = `
                <div style="color:#ff4444">⚠️ SIN LIQUIDEZ EN DEX</div>
                <div style="font-size:0.7rem">Inyecta SOL en Raydium para activar</div>
            `;
        }
    } catch(e) {
        document.getElementById('liquidez-info').innerHTML = `<span style="color:red">🔴 Error de Servidor</span>`;
    }
}

async function load(){
  try {
      const r = await fetch(`${API_BASE}/api/status`);
      const d = await r.json();
      let h='';

      // d ahora debe venir como un objeto con los repos o un array
      // Ajustamos según la estructura que maneja tu server.js
      Object.keys(d).forEach(name => {
        const x = d[name];
        h+=`
        <div class="repo-card">
          <h3>${name.toUpperCase()}</h3>
          <p style="font-size: 0.8rem; color: #888;">Puerto: ${x.port || 'N/A'}</p>
          <button class="on" onclick="start('${name}')">START</button>
          <button class="off" onclick="stop('${name}')">STOP</button>
          <button style="background:#444; color:#fff" onclick="viewLogs('${name}')">LOGS</button>
          <div class="status">${x.pid ? '🟢 ACTIVO' : '🔴 APAGADO'}</div>
          <div id="logs-${name}" class="logs-box" style="display:none"></div>
        </div>`;
      });

      document.getElementById('repos').innerHTML = h;
  } catch(e) {
      document.getElementById('repos').innerHTML = '<p style="color:red">Error conectando con el servidor...</p>';
  }
}

async function start(r){ await fetch(`${API_BASE}/api/start/${r}`, {method: 'POST'}); load(); }
async function stop(r){ await fetch(`${API_BASE}/api/stop/${r}`, {method: 'POST'}); load(); }

async function viewLogs(r){
    const div = document.getElementById(`logs-${r}`);
    if(div.style.display === 'block') {
        div.style.display = 'none';
        return;
    }
    try {
        const res = await fetch(`${API_BASE}/api/repos/${r}/logs`);
        const data = await res.json();
        div.innerHTML = `<pre>${data.logs || 'Sin registros'}</pre>`;
        div.style.display = 'block';
    } catch(e) {
        alert("No se pudieron cargar los logs");
    }
}

// Intervalos de actualización
setInterval(load, 5000); 
setInterval(updateLiquidez, 15000);

load();
updateLiquidez();
</script>

</body>
</html>
