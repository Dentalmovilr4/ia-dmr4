version: "3.9"

services:
  # --- INFRAESTRUCTURA CORE ---
  redis:
    image: redis:7-alpine
    container_name: dmr4-redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - dmr4-net

  # --- CONTROL Y ORQUESTACIÓN (Original + Nuevo) ---
  orchestrator:
    build: .
    container_name: orchestrator
    command: node orchestrator.js
    restart: unless-stopped
    environment:
      - REDIS_HOST=redis
      - CLUSTER_SECRET=${CLUSTER_SECRET}
    volumes:
      - ./certs:/app/certs
      - ./data.json:/app/data.json
    ports:
      - "5001:5001"
      - "9100:9100"
    networks:
      - dmr4-net

  control_plane:
    build: .
    container_name: dmr4-control-plane
    command: node controlPlane.js
    depends_on:
      - redis
    env_file: .env
    restart: always
    networks:
      - dmr4-net

  # --- INTELIGENCIA, RIESGO Y ALPHA LAB ---
  risk_engine:
    build: .
    container_name: dmr4-risk-engine
    command: node RiskEngine.js
    depends_on:
      - redis
    env_file: .env
    restart: always
    networks:
      - dmr4-net

  alpha_lab:
    build: .
    container_name: dmr4-alpha-lab
    command: node AlphaResearchLab.js
    depends_on:
      - redis
    env_file: .env
    restart: always
    networks:
      - dmr4-net

  portfolio_opt:
    build: .
    container_name: dmr4-portfolio-opt
    command: node portfolioOptimizer.js
    depends_on:
      - redis
    env_file: .env
    restart: always
    networks:
      - dmr4-net

  # --- EJECUCIÓN Y OPERACIONES ---
  fund_system:
    build: .
    container_name: dmr4-fund-system
    command: node fundSystem.js
    depends_on:
      - redis
    env_file: .env
    restart: always
    networks:
      - dmr4-net

  execution_algo:
    build: .
    container_name: dmr4-execution-algo
    command: node ExecutionAlgo.js
    depends_on:
      - redis
    env_file: .env
    restart: always
    networks:
      - dmr4-net

  # --- WORKERS ESCALABLES Y AUTOSCALER ---
  worker:
    build: .
    command: node workerNode.js
    deploy:
      replicas: 1
    environment:
      - MASTER_HOST=orchestrator
      - REDIS_HOST=redis
      - CLUSTER_SECRET=${CLUSTER_SECRET}
    volumes:
      - ./certs:/app/certs
      - .:/app
    networks:
      - dmr4-net

  ultra_worker_1:
    build: .
    container_name: dmr4-ultra-worker-1
    command: node ultraWorker.js
    depends_on:
      - redis
    env_file: .env
    restart: always
    networks:
      - dmr4-net

  autoscaler:
    build: .
    container_name: dmr4-autoscaler
    command: node autoscaler.js
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - REDIS_HOST=redis
    networks:
      - dmr4-net

  # --- MONITOREO Y ALERTAS ---
  alert-bridge:
    build: .
    container_name: alert-bridge
    command: node alertBridge.js
    restart: always
    env_file: .env
    ports:
      - "3001:3001"
    networks:
      - dmr4-net

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - ./alert.rules.yml:/etc/prometheus/alert.rules.yml
    ports:
      - "9090:9090"
    networks:
      - dmr4-net

  alertmanager:
    image: prom/alertmanager
    container_name: alertmanager
    volumes:
      - ./alertmanager.yml:/etc/alertmanager/alertmanager.yml
    networks:
      - dmr4-net
    ports:
      - "9093:9093"

networks:
  dmr4-net:
    driver: bridge

